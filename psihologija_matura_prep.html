<script>
const OBLASTI = [

      {h:'Metode', items:[
        '<span class="key">Posmatranje</span>: spoljašnje (objektivno) i introspekcija (subjektivno, jedinstven psihološki metod)',

  {

        '<span class="key">Filogeneza</span> = razvoj vrste; <span class="key">ontogeneza</span> = razvoj jedinke (od začeća do smrti)',

        '<span class="key">Džejms–Lange</span>: emocija = svijest o tjelesnim promjenama; <span class="key">Kenon–Bard</span>: istovremeno i tijelo i doživljaj; <span class="key">Šekter–Singer</span>: kognitivna procjena određuje emociju',

let activeFilter = 'sve';
let qList = [], qIdx = 0, score = 0, answered = false;

function showTab(id) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function toggleCard(el) {
  el.classList.toggle('open');
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function startQuiz() {
  let pool = activeFilter === 'sve' ? [...KVIZ_PITANJA] : KVIZ_PITANJA.filter(q=>q.o===activeFilter);
  pool = pool.sort(()=>Math.random()-0.5).slice(0,10);
  qList = pool; qIdx = 0; score = 0; answered = false;
  renderQuestion();
}

function renderQuestion() {
  if(qIdx >= qList.length) { renderScore(); return; }
  const q = qList[qIdx];
  const pct = Math.round((qIdx/qList.length)*100);
  const oNaziv = OBLASTI.find(o=>o.id===q.o);
  document.getElementById('quizContent').innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <span class="area-badge">${oNaziv?oNaziv.naziv:q.o}</span>
    <div class="q-num">Pitanje ${qIdx+1} od ${qList.length}</div>
    <div class="q-text">${q.p}</div>
    <div class="options">
      ${q.opt.map((o,i)=>`<button class="opt" id="opt${i}" onclick="answer(${i})">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="quiz-nav">
      <span style="font-size:13px;color:var(--color-text-secondary)">Rezultat: ${score}/${qIdx}</span>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQ()" style="display:none">Sljedeće →</button>
    </div>`;
  answered = false;
}

function answer(i) {
  if(answered) return;
  answered = true;
  const q = qList[qIdx];
  const fb = document.getElementById('feedback');
  document.querySelectorAll('.opt').forEach((b,idx)=>{
    b.disabled = true;
    if(idx === q.t) b.classList.add('correct');
    else if(idx === i && i !== q.t) b.classList.add('wrong');
  });
  if(i === q.t) {
    score++;
    fb.className = 'feedback show ok';
    fb.textContent = '✓ Tačno! ' + q.obj;
  } else {
    fb.className = 'feedback show nok';
    fb.textContent = '✗ Netačno. ' + q.obj;
  }
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQ() { qIdx++; renderQuestion(); }

function renderScore() {
  const pct = Math.round((score/qList.length)*100);
  let msg = pct>=80?'Odlično! Spreman/na za maturu!':pct>=60?'Dobro! Još malo vježbe.':'Ponovi gradivo i pokušaj ponovo.';
  document.getElementById('quizContent').innerHTML = `
    <div class="score-box">
      <div class="score-big">${score}/${qList.length}</div>
      <div class="score-label">${pct}% tačnih · ${msg}</div>
      <button class="btn btn-primary" onclick="startQuiz()">Novi kviz</button>
    </div>`;
}

function buildAreas() {
  const grid = document.getElementById('areaGrid');
  OBLASTI.forEach(o=>{
    const div = document.createElement('div');
    div.className = 'area-card';
    div.onclick = ()=>div.classList.toggle('open');
    let tHtml = o.teze.map(t=>`
      <h4>${t.h}</h4>
      <ul>${t.items.map(i=>`<li>${i}</li>`).join('')}</ul>
    `).join('');
    div.innerHTML = `
      <div class="area-pct">Oblast ${o.id} · ${o.pct} ispita</div>
      <div class="area-title">${o.naziv}</div>
      <div class="area-sub">${o.sub}</div>
      <div class="teze">${tHtml}</div>`;
    grid.appendChild(div);
  });
}

function buildGlossary() {
  const g = document.getElementById('glossaryGrid');
  POJMOVI.forEach(p=>{
    const div = document.createElement('div');
    div.style.cssText='background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem';
    const oNaziv = OBLASTI.find(o=>o.id===p.o);
    div.innerHTML=`
      <div style="font-size:10px;color:var(--color-text-info);margin-bottom:6px">${oNaziv?oNaziv.naziv:p.o}</div>
      <div style="font-size:14px;font-weight:500;margin-bottom:6px;color:var(--color-text-primary)">${p.p}</div>
      <div style="font-size:13px;color:var(--color-text-secondary);line-height:1.6">${p.d}</div>`;
    g.appendChild(div);
  });
}

buildAreas();
